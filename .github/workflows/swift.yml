name: Swift

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Resolve Package
        run: swift package resolve

      - name: Build
        run: swift build -v

      - name: Run Tests
        run: |
          if [ -d Tests ] && [ -n "$(find Tests -mindepth 1 -print -quit)" ]; then
            swift test -v
          else
            echo "No SwiftPM tests found. Skipping."
          fi
